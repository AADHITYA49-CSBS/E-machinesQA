<!DOCTYPE html>
<html>
<head>
    <title>Ask Question</title>
</head>
<body>

<h2>Ask Electrical Machines Question</h2>

<form method="POST">
    {% csrf_token %}

    <textarea
        name="question"
        rows="5"
        cols="50"
        placeholder="Ask about transformers, motors, generators..."
    ></textarea>

    <br><br>

    <button type="submit">
        Get Answer
    </button>

</form>

{% if success %}
    <p style="color:green;">Your question was submitted successfully.</p>
{% endif %}

</body>
</html>
